# Cross-team / cross-project dependencies the Fantasy team is tracking.
#
# Schema:
#   dependencies:
#     - key:     "FNTSY-1234" | "CAT-567" | "FEAT-89"   (required)
#       team:    "DSEA" | "Shared Services" | etc.       (optional — chip)
#       summary: "..."                                   (optional override; FNTSY pulls from DB)
#       owner:   "..."                                   (optional override)
#       status:  "Open" | "In Progress" | "Done" | etc.  (optional override)
#       url:     "https://..."                            (optional override)
#       notes:   |                                        (free-text, edited
#         Multi-line notes the team writes.                in-page or here)
#
# FNTSY-prefixed keys auto-populate summary/owner/status/url from the local
# tickets table when present. Other projects (CAT, FEAT, …) live entirely in
# this YAML — fill in summary/owner/status manually.
#
# Edits via conversation: tell the assistant "add CAT-123 to dependencies"
# or "update notes on FNTSY-456 to say …"; or type directly into the page's
# textarea and click Save (writes here via /api/dependency-notes).
#
# IMPORTANT: when /api/dependency-notes saves notes, ruamel.yaml preserves
# this comment block if installed. Plain PyYAML strips it on round-trip —
# so prefer ruamel where possible. Keep this header tidy so users editing
# by hand still see the schema.

